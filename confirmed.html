<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmed – AccessVeil Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #0a0a1a;
            color: #e2e8f0;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; text-align: center; padding: 20px;
        }
        body::before {
            content: ''; position: fixed; inset: 0;
            background: linear-gradient(rgba(108,92,231,0.03) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(108,92,231,0.03) 1px, transparent 1px);
            background-size: 60px 60px; pointer-events: none;
        }
        .card {
            background: #1a1a2e; border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px; padding: 60px 40px; max-width: 520px; width: 100%;
            position: relative; z-index: 1;
        }
        .icon {
            width: 80px; height: 80px; margin: 0 auto 24px;
            background: linear-gradient(135deg, #10b981, #34d399);
            border-radius: 20px; display: flex; align-items: center; justify-content: center;
            font-size: 40px; color: white;
            box-shadow: 0 12px 30px rgba(16,185,129,0.3);
        }
        h1 { font-size: 28px; font-weight: 800; margin-bottom: 12px; color: white; }
        p { color: #94a3b8; font-size: 16px; margin-bottom: 32px; line-height: 1.6; }
        .btn {
            display: inline-flex; align-items: center; gap: 10px;
            padding: 14px 28px; border-radius: 60px; font-weight: 700;
            font-size: 15px; text-decoration: none; transition: all 0.3s;
            background: linear-gradient(135deg, #6c5ce7, #8b5cf6);
            color: white; box-shadow: 0 8px 24px rgba(108,92,231,0.3);
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(108,92,231,0.4); }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon"><i class="fas fa-check-circle"></i></div>
        <h1>Access Confirmed!</h1>
        <p>Authorization successful. You can close this page and return to your WordPress dashboard.</p>
        <a href="index.html" class="btn"><i class="fas fa-arrow-left"></i> Back to AccessVeil Pro</a>
    </div>
</body>
</html>
